# .github/workflows/build.yml
#
# Triggers on:  git tag v1.0.0  →  git push --tags
# Produces:     pixnarr-windows-v1.0.0.exe  (attached to the GitHub Release)

name: Build Pixnarr Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python + backend bundle ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies + Nuitka
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka zstandard ordered-set

      - name: Download FFmpeg binaries
        working-directory: backend
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ffmpeg_bin
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted -Force
          $ffmpegDir = Get-ChildItem -Path ffmpeg_extracted -Filter "ffmpeg-*" -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe"  -Destination ffmpeg_bin\
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" -Destination ffmpeg_bin\
          Remove-Item ffmpeg.zip, ffmpeg_extracted -Recurse -Force
          Write-Host "FFmpeg bundled successfully"

      - name: Bundle backend with Nuitka
        working-directory: backend
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --output-dir=dist `
            --output-filename=pixnarr_backend.exe `
            --windows-console-mode=disable `
            --assume-yes-for-downloads `
            --follow-imports `
            --include-package=app `
            --include-package=fastapi `
            --include-package=uvicorn `
            --include-package=uvicorn.lifespan `
            --include-package=uvicorn.protocols `
            --include-package=uvicorn.loops `
            --include-package=starlette `
            --include-package=pydantic `
            --include-package=pydantic_core `
            --include-package=httpx `
            --include-package=anyio `
            --include-package=anyio._backends `
            --include-package=h11 `
            --include-package=dotenv `
            --include-package=groq `
            --include-data-dir=ffmpeg_bin=ffmpeg_bin `
            --enable-plugin=anti-bloat `
            run_server.py

      # ── Node + Next.js build ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pixlayout/package-lock.json

      - name: Install Next.js dependencies
        working-directory: pixlayout
        run: npm ci

      - name: Build Next.js app
        working-directory: pixlayout
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: 'http://localhost:8080'

      # ── Electron build ────────────────────────────────────────────────────
      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Electron installer (Windows)
        working-directory: electron
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload to GitHub Release ──────────────────────────────────────────
      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
